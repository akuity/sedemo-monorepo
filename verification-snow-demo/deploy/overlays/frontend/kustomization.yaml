apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

namespace: snow-demo-dev-frontend

nameSuffix: -frontend

patches:
- target:
    kind: Ingress
    name: stable-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: snow-demo-dev-frontend.akpdemoapps.link
