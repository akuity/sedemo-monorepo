name: Delete Project
on:
  workflow_dispatch:
    inputs:
      teamName:
        description: "Team name to delete (e.g., team-latte). Removes templated/<teamName>/ from the repo."
        required: true
        type: string
jobs:
  delete-team-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check folder exists
        id: check
        run: |
          if [ -d "templated/${{ inputs.teamName }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Folder templated/${{ inputs.teamName }} does not exist — nothing to delete."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove team folder
        if: steps.check.outputs.exists == 'true'
        run: rm -rf "templated/${{ inputs.teamName }}"

      - name: Commit and push
        if: steps.check.outputs.exists == 'true'
        run: |
          /usr/bin/git config --global user.name "Akuity Bot"
          /usr/bin/git config --global user.email "akuitybot@akuity.io"
          git add "templated/${{ inputs.teamName }}/"
          git commit -m "Remove ${{ inputs.teamName }} from templated folder"
          git push -u origin main

  refresh-appset:
    runs-on: ubuntu-latest
    needs: delete-team-config
    steps:
      - name: Refresh templated-apps AppSet on ArgoCD
        run: |
          curl -s -f -o /dev/null \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applicationsets/templated-apps?forceRefresh=true"
