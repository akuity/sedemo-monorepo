name: Create Project Repo
on:
  workflow_dispatch:
    inputs:
      repoName:
        description: "Repo name suffix (e.g., team-momo). Full repo will be sedemo-app-<repoName>."
        required: true
        type: string
      rolloutsEnabled:
        description: "Enable Argo Rollouts."
        required: false
        type: boolean
        default: true
jobs:
  create-project-repo:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Create repo from template
        run: |
          FULL_REPO="sedemo-app-${{ inputs.repoName }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/akuity/${FULL_REPO}")
          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "Repo akuity/${FULL_REPO} already exists, skipping creation."
          else
            gh repo create "akuity/${FULL_REPO}" \
              --template akuity/sedemo-apptemplate \
              --public
            # Wait for GitHub to finish applying the template
            echo "Waiting for template to initialise..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/akuity/${FULL_REPO}/git/refs/heads/main")
              [ "${STATUS}" = "200" ] && break
              sleep 5
            done
          fi

      - name: Write app-values.yaml via GitHub Contents API
        run: |
          FULL_REPO="sedemo-app-${{ inputs.repoName }}"
          CONTENT=$(printf 'image:\n  repository: ghcr.io/akuity/%s\ningress:\n  custom_prefix: %s\nrollouts:\n  enabled: %s\n' \
            "${FULL_REPO}" "${{ inputs.repoName }}" "${{ inputs.rolloutsEnabled }}" | base64 -w 0)

          # Fetch existing file SHA if the file already exists (required for updates)
          FILE_SHA=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/akuity/${FULL_REPO}/contents/platform/app-values.yaml" \
            | jq -r '.sha // empty')

          if [ -n "${FILE_SHA}" ]; then
            PAYLOAD=$(jq -n --arg msg "Configure app-values.yaml" --arg c "${CONTENT}" --arg s "${FILE_SHA}" \
              '{message: $msg, content: $c, sha: $s}')
          else
            PAYLOAD=$(jq -n --arg msg "Configure app-values.yaml" --arg c "${CONTENT}" \
              '{message: $msg, content: $c}')
          fi

          curl -s -f -o /dev/null -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "https://api.github.com/repos/akuity/${FULL_REPO}/contents/platform/app-values.yaml"

  refresh-appset:
    runs-on: ubuntu-latest
    needs: create-project-repo
    steps:
      - name: Force refresh templated-repo-projects AppSet on ArgoCD
        run: |
          curl -s -f -o /dev/null \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applicationsets/templated-repo-projects?forceRefresh=true"
