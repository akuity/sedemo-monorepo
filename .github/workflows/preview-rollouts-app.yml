name: PR Preview Image
run-name: Build preview image for PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    branches:
      - main
    paths:
      - 'rollouts-app/**'
      - '.github/workflows/preview-rollouts-app.yml'

permissions:
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-rollouts-app

jobs:
  preview:
    defaults:
      run:
        working-directory: rollouts-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick preview color
        run: |
          COLORS=("red" "green" "blue" "yellow" "purple" "orange")
          INDEX=$(( ${{ github.event.pull_request.number }} % ${#COLORS[@]} ))
          echo "APP_COLOR=${COLORS[$INDEX]}" >> $GITHUB_ENV

      - name: Build and push PR preview image
        uses: docker/build-push-action@v5
        id: push
        with:
          context: rollouts-app
          push: true
          build-args: |
            COLOR=${{ env.APP_COLOR }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}-${{ env.APP_COLOR }}
          # Tag convention expected by demo-ephemeral per-PR Warehouse (^pr-<N>-.+$)
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ env.APP_COLOR }}
