name: Delete Project Repo
on:
  workflow_dispatch:
    inputs:
      repoName:
        description: "Repo name suffix to delete (e.g., team-momo). Deletes akuity/sedemo-app-<repoName>."
        required: true
        type: string
jobs:
  delete-project-repo:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Delete repo
        run: |
          FULL_REPO="sedemo-app-${{ inputs.repoName }}"
          if gh repo view "akuity/${FULL_REPO}" &>/dev/null; then
            gh repo delete "akuity/${FULL_REPO}" --yes
            echo "Deleted akuity/${FULL_REPO}."
          else
            echo "Repo akuity/${FULL_REPO} does not exist, nothing to delete."
          fi

  refresh-appset:
    runs-on: ubuntu-latest
    needs: delete-project-repo
    steps:
      - name: Force refresh templated-repo-projects AppSet on ArgoCD
        run: |
          curl -s -f -o /dev/null \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "https://${{ secrets.ARGOCD_SERVER }}/api/v1/applicationsets/templated-repo-projects?forceRefresh=true"
