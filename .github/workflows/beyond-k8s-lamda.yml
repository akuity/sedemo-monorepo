name: Publish new image
run-name: Publish new lamda

on:
  push:
    branches:
      - main
    paths:
      - 'beyond-k8s/lambda-app/**'
      - '.github/workflows/beyond-k8s-lamda.yml'
permissions:
  packages: write
  attestations: write
  contents: read
  id-token: write
  pull-requests: write

env:
  REGISTRY: 218691292270.dkr.ecr.us-west-2.amazonaws.com/sedemo/beyond-k8s-lambda
  IMAGE_NAME: ${{ github.repository }}-beyond-k8s-lambda
  AWS_REGION: us-west-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}

jobs:
  publish:
    defaults:
      run:
        working-directory: beyond-k8s/lambda-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Amazon ECR Private
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        id: push
        with:
          context: beyond-k8s/lambda-app
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}:latest
            ${{ env.REGISTRY }}:0.1.${{ github.run_number }}
  