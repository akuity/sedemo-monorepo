apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

namespace: snow-demo-prod-amer-east-backend

nameSuffix: -backend

patches:
- target:
    kind: Ingress
    name: stable-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: snow-demo-prod-amer-east-backend.akpdemoapps.link
- target:
    kind: Rollout
    name: rollouts-app
  patch: |-
    - op: replace
      path: /spec/strategy/canary/canaryService
      value: rollouts-svc-canary-backend
    - op: replace
      path: /spec/strategy/canary/stableService
      value: rollouts-svc-stable-backend
    - op: replace
      path: /spec/strategy/canary/steps/2/analysis/templates/0/templateName
      value: loadgen-backend
    - op: replace
      path: /spec/strategy/canary/analysis/templates/0/templateName
      value: response-time-backend
    - op: replace
      path: /spec/strategy/canary/trafficRouting/nginx/stableIngress
      value: stable-ingress-backend
- target:
    kind: AnalysisTemplate
    name: loadgen
  patch: |-
    - op: replace
      path: /spec/metrics/0/provider/job/spec/template/spec/containers/0/command
      value: [ab, "-n20", "-mPOST", "http://snow-demo-prod-amer-east-backend.akpdemoapps.link/"]
- target:
    kind: AnalysisTemplate
    name: success-rate
  patch: |-
    - op: replace
      path: /spec/metrics/0/provider/prometheus/query
      value: |
        ( sum(rate(nginx_ingress_controller_requests{namespace="snow-demo-prod-amer-east-backend",status="200",canary="snow-demo-prod-amer-east-backend-rollouts-svc-canary-backend-80"}[30s])) + 1 )
        /
        ( sum(rate(nginx_ingress_controller_requests{namespace="snow-demo-prod-amer-east-backend",canary="snow-demo-prod-amer-east-backend-rollouts-svc-canary-backend-80"}[30s])) + 1 )
- target:
    kind: AnalysisTemplate
    name: response-time
  patch: |-
    - op: replace
      path: /spec/metrics/0/provider/prometheus/query
      value: |
        sum(rate(nginx_ingress_controller_response_duration_seconds_sum{namespace="snow-demo-prod-amer-east-backend",method="POST",canary="snow-demo-prod-amer-east-backend-rollouts-svc-canary-backend-80"}[30s]) or vector(.1)) 
        /
        sum(rate(nginx_ingress_controller_response_duration_seconds_count{namespace="snow-demo-prod-amer-east-backend",method="POST",canary="snow-demo-prod-amer-east-backend-rollouts-svc-canary-backend-80"}[30s])  or vector(.1))
