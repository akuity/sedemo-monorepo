apiVersion: batch/v1
kind: CronJob
metadata:
  name: harvestr-lost-revenue
spec:
  # Runs at 08:00 UTC every day
  schedule: "0 8 * * *"
  # Keep the last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # If a previous job is still running, skip the new one
  concurrencyPolicy: Forbid
  suspend: true # DO NOT RUN (yet)
  jobTemplate:
    spec:
      # Retry up to 2 times on failure before giving up
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: harvestr-lost-revenue
              image: ghcr.io/akuity/sedemo-monorepo-snow-poke:latest
              imagePullPolicy: Always
              env:
                - name: HARVESTR_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: harvestr-credentials
                      key: username
                - name: HARVESTR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: harvestr-credentials
                      key: password
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"