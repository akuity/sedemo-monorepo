apiVersion: v1
kind: Service
metadata:
  name: rollouts-svc-stable-backend
  annotations:
    prometheus.io/fastscrape: 'true'
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: rollouts-app
---
# Source: deploy/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: rollouts-svc-canary-backend
  annotations:
    prometheus.io/fastscrape: 'true'
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: rollouts-app
---
# Source: deploy/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stable-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: "snow-demo-dev-backend.akpdemoapps.link"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: rollouts-svc-stable-backend
            port:
              number: 80
---
# Source: deploy/templates/analysis.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-backend
spec:
  metrics:
  - name: success-rate
    interval: 15s
    successCondition: len(result) == 0 || result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-server.prometheus.svc.cluster.local
        query: |
          ( sum(rate(nginx_ingress_controller_requests{namespace="snow-demo-dev-backend",status="200",canary="snow-demo-dev-backend-rollouts-svc-canary-backend-80"}[30s])) + 1 )
          /
          ( sum(rate(nginx_ingress_controller_requests{namespace="snow-demo-dev-backend",canary="snow-demo-dev-backend-rollouts-svc-canary-backend-80"}[30s])) + 1 )
---
# Source: deploy/templates/analysis.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: response-time-backend
spec:
  metrics:
  - name: response-time
    interval: 10s
    successCondition: len(result) == 0 || result[0] <= 1.5
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus-server.prometheus.svc.cluster.local
        query: |
          sum(rate(nginx_ingress_controller_response_duration_seconds_sum{namespace="snow-demo-dev-backend",method="POST",canary="snow-demo-dev-backend-rollouts-svc-canary-backend-80"}[30s]) or vector(.1)) 
          /
          sum(rate(nginx_ingress_controller_response_duration_seconds_count{namespace="snow-demo-dev-backend",method="POST",canary="snow-demo-dev-backend-rollouts-svc-canary-backend-80"}[30s])  or vector(.1))
---
# Source: deploy/templates/loadgen.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: loadgen-backend
spec:
  metrics:
  - name: load-gen
    provider:
      job:
        spec:
          template:
            spec:
              containers:
              - name: loadgen
                image: jordi/ab
                command: [ab,"-n20","-mPOST","http://snow-demo-dev-backend.akpdemoapps.link/"]
              restartPolicy: Never
          backoffLimit: 1
---
# Source: deploy/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rollouts-app
  template:
    metadata:
      labels:
        app: rollouts-app
    spec:
      containers:
        - image: "ghcr.io/akuity/sedemo-monorepo-snow-demo:16-purple"
          name: rollouts-app
          ports:
            - containerPort: 8080
          env:
            - name: SEMVER
              value: "16-purple"
            - name: STAGE
              value: dev
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
  minReadySeconds: 30
  revisionHistoryLimit: 3
  strategy:
    canary:
      canaryService: rollouts-svc-canary-backend
      stableService: rollouts-svc-stable-backend
      trafficRouting:
        nginx:
          stableIngress: stable-ingress-backend
      analysis:
        templates:
        - templateName: response-time-backend
        - templateName: loadgen-backend
        startingStep: 3
      maxSurge: '25%'
      maxUnavailable: 0
      steps:
        - setWeight: 10
        - pause:
            duration: 2s 
        - analysis:
            templates:
            - templateName: loadgen-backend
        - setWeight: 20
        - pause:
            duration: 2s 
        - setWeight: 50
        - pause:
            duration: 20s 
        - setWeight: 75
        - pause:
            duration: 20s 
        - setWeight: 100
